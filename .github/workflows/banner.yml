name: Auto-Generate Banner

on:
  push:
    paths:
      - 'banner/index.html'
      - 'banner/style.css'
      - 'banner/background.png'
      - 'banner/portrait.png'
      - 'generate-banner.js'
  workflow_dispatch:

jobs:
  generate-banner:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Install Puppeteer Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libasound2 libpangocairo-1.0-0 libxss1 libgtk-3-0

      - name: Generate Banner
        run: node generate-banner.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add banner/yusuf_bera_hero.png
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-generate updated banner [skip ci]"
          git push
