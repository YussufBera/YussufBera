<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Bera Arslan - GitHub Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="hero-container">
        <!-- Background elements -->
        <div class="bg-gradient"></div>
        <div class="grid-pattern"></div>
        <div class="glow-sphere s1"></div>
        <div class="glow-sphere s2"></div>

        <div class="content">
            <div class="left-section">
                <div class="badge-container">
                    <span class="badge">AI-Focused Developer</span>
                    <span class="badge">Full-Stack Engineer</span>
                </div>
                <h1 class="name">Yusuf Bera <span>Arslan</span></h1>
                <p class="subtitle">AI-Focused Software Developer</p>
                <p class="tagline">I build AI-powered products and <br>scalable web applications</p>

                <div class="tech-stack">
                    <div class="tech-item"><img
                            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg"
                            alt="React"><span>React</span></div>
                    <div class="tech-item"><img
                            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg"
                            alt="Next.js" class="invert"><span>Next.js</span></div>
                    <div class="tech-item"><img
                            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg"
                            alt="Node.js"><span>Node.js</span></div>
                    <div class="tech-item"><img
                            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-original.svg"
                            alt="TypeScript"><span>TypeScript</span></div>
                    <div class="tech-item">
                        <div class="ai-icon">AI</div><span>AI APIs</span>
                    </div>
                </div>
            </div>

            <div class="right-section">
                <div class="portrait-container">
                    <div class="portrait-glow"></div>
                    <img src="portrait_transparent.png" alt="Yusuf Bera Arslan" class="portrait">
                    <!-- Floating UI elements -->
                    <div class="floating-code">
                        <pre><code>const ai = new Model();
ai.optimize(product);</code></pre>
                    </div>
                </div>
            </div>
        </div>

        <!-- Decorative lines -->
        <div class="line l1"></div>
        <div class="line l2"></div>
    </div>
</body>

</html>
